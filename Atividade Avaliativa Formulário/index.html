<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Profissional</title>
</head>

<body>
    <form name="cadastroUsuário" action="recebedados.php" method="post">
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="idnome">Nome Completo: </label>
            <input type="text" name="nome" id="idnome" autofocus placeholder="campo obrigatório" required>

            <br><br>

            <span>Gênero:</span>

            <input type="radio" name="gênero" id="feminino" value="feminino">
            <label for="feminino">Feminino</label>

            <input type="radio" name="gênero" id="masculino" value="masculino">
            <label for="masculino">Masculino</label>

            <input type="radio" name="gênero" id="outro" value="outro">
            <label for="outro">Outro</label>

            <input type="radio" name="gênero" id="prefiro-nao-responder" value="prefiro-nao-responder">
            <label for="prefiro-nao-responder">Prefiro não responder</label>

            <br><br>

            <label for="dataNasc">Data de Nascimento: </label>
            <input type="date" name="dataNasc" id="dataNasc" min="1926-04-27" max="2008-04-27">

            <br><br>

            <label for="email">E-mail: </label>
            <input type="email" name="email" id="email" placeholder="campo obrigatório" required>

            <br><br>

            <label for="site">URL site pessoal: </label>
            <input type="url" name="site" id="site">

            <br><br>

            <label for="endereco">Endereço (Rua, número e complemento): </label>
            <input type="text" name="endereço" id="endereco" placeholder="campo obrigatório" required>

            <br><br>

            <label for="cidade">Cidade: </label>
            <select name="cidade" id="cidade">
                <option disabled selected>Selecione a Cidade</option>
                <option value="a">Alvorada</option>
                <option value="c">Canoas</option>
                <option value="e">Esteio</option>
                <option value="g">Gravataí</option>
                <option value="nh">Novo Hamburgo</option>
                <option value="pf">Passo Fundo</option>
                <option value="p">Pelotas</option>
                <option value="poa">Porto Alegre</option>
                <option value="sl">São Leopoldo</option>
            </select>

            <br><br>

            <label for="tel">Telefone: </label>
            <input type="tel" name="tel" id="tel">

        </fieldset>

        <fieldset>
            <legend>Dados Profissionais</legend>

            <span>Áreas de atuação: </span>

            <input type="checkbox" name="design" id="design">
            <label for="design">Design</label>

            <input type="checkbox" name="dev-front-end" id="dev-front-end">
            <label for="dev-front-end">Desenvolvimento Front-end</label>

            <input type="checkbox" name="dev-back-end" id="dev-back-end">
            <label for="dev-back-end">Desenvolvimento Back-end</label>

            <input type="checkbox" name="softwareEngineer" id="softwareEngineer">
            <label for="softwareEngineer">Engenharia de Software</label>

            <input type="checkbox" name="bancoDados" id="bancoDados">
            <label for="bancoDados">Banco de Dados</label>

            <input type="checkbox" name="analiseTestes" id="analiseTestes">
            <label for="analiseTestes">Análise de Testes</label>

            <input type="checkbox" name="analiseNegócios" id="analiseNegocios">
            <label for="analiseNegocios">Análise de Negócios</label>

            <input type="checkbox" name="manutenção" id="manutencao">
            <label for="manutencao">Manutenção</label>

            <br><br>

            <label for="formacao">Formação: </label>
            <input list="opções-formação" name="formação" id="formacao">

            <datalist id="opcoes-formacao">
                <option value="Ensino Fundamental"></option>
                <option value="Ensino Médio"></option>
                <option value="Ensino Superior"></option>
                <option value="Especialização"></option>
                <option value="Mestrado"></option>
                <option value="Doutorado"></option>
            </datalist>

            <br><br>

            <label for="historico">Breve histórico profissional: </label>
            <br>
            <textarea name="histórico" id="historico" cols="50" rows="8" minlength="50" maxlength="500"></textarea>

            <br><br>

            <label for="arquivo">Anexe seu Currículo: </label>
            <input type="file" name="arquivo" id="arquivo">

            <br><br>

            <label for="disponibilidade">Disponibilidade de horas semanais: </label>
            <select name="disponibilidade" id="disponibilidade">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40">40</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Agendamento de Entrevista</legend>

            <label for="dataEntrevista">Data: (obrigatório)</label>
            <input type="date" name="dataEntrevista" id="dataEntrevista" required>

            <br><br>

            <label for="horarioEntrevista">Horário: (obrigatório)</label>
            <input type="time" name="horárioEntrevista" id="horarioEntrevista" required>

        </fieldset>

        <br><br>

        <input type="submit">
    </form>
</body>

</html>
